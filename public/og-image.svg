<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070a"/>
      <stop offset="40%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#08080e"/>
    </linearGradient>
    <radialGradient id="glow-bl" cx="0.15" cy="0.75" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-tr" cx="0.85" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="0.5" cy="0.42" r="0.35">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow-bl)"/>
  <rect width="1200" height="630" fill="url(#glow-tr)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>

  <!-- Plexus constellation — top-left cluster -->
  <circle cx="90" cy="90" r="2.5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="200" cy="60" r="1.8" fill="#6366f1" opacity="0.25"/>
  <circle cx="160" cy="170" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="300" cy="120" r="1.2" fill="#3b82f6" opacity="0.15"/>
  <line x1="90" y1="90" x2="200" y2="60" stroke="#3b82f6" stroke-width="0.6" opacity="0.12"/>
  <line x1="90" y1="90" x2="160" y2="170" stroke="#8b5cf6" stroke-width="0.5" opacity="0.1"/>
  <line x1="200" y1="60" x2="300" y2="120" stroke="#6366f1" stroke-width="0.4" opacity="0.08"/>

  <!-- Plexus — bottom-right cluster -->
  <circle cx="1060" cy="500" r="2.5" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="1120" cy="540" r="1.8" fill="#3b82f6" opacity="0.25"/>
  <circle cx="1000" cy="560" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="1100" cy="430" r="1.2" fill="#8b5cf6" opacity="0.15"/>
  <line x1="1060" y1="500" x2="1120" y2="540" stroke="#3b82f6" stroke-width="0.6" opacity="0.12"/>
  <line x1="1060" y1="500" x2="1000" y2="560" stroke="#8b5cf6" stroke-width="0.5" opacity="0.1"/>
  <line x1="1060" y1="500" x2="1100" y2="430" stroke="#6366f1" stroke-width="0.4" opacity="0.08"/>

  <!-- Scattered lone nodes -->
  <circle cx="980" cy="80" r="1" fill="#3b82f6" opacity="0.12"/>
  <circle cx="1050" cy="130" r="0.8" fill="#8b5cf6" opacity="0.1"/>
  <line x1="980" y1="80" x2="1050" y2="130" stroke="#6366f1" stroke-width="0.3" opacity="0.07"/>
  <circle cx="150" cy="500" r="1" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="250" cy="550" r="0.8" fill="#3b82f6" opacity="0.1"/>
  <line x1="150" y1="500" x2="250" y2="550" stroke="#6366f1" stroke-width="0.3" opacity="0.07"/>

  <!-- Corner brackets — refined -->
  <g opacity="0.2" stroke="#e0e0e0" stroke-width="1.2" fill="none">
    <polyline points="50,100 50,50 100,50"/>
    <polyline points="1100,50 1150,50 1150,100"/>
    <polyline points="50,530 50,580 100,580"/>
    <polyline points="1100,580 1150,580 1150,530"/>
  </g>

  <!-- ════════════ CONTENT ════════════ -->

  <!-- Code comment — dev identity -->
  <text x="600" y="165" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-weight="400" font-size="13" fill="#6366f1" letter-spacing="4" opacity="0.6">&#60; portfolio /&#62;</text>

  <!-- Name -->
  <text x="600" y="265" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="86" fill="url(#name-grad)" letter-spacing="-3">Pragadeesh</text>

  <!-- Accent line under name -->
  <line x1="380" y1="288" x2="820" y2="288" stroke="url(#accent-line)" stroke-width="1.5"/>

  <!-- Role — cleaner, wider spacing -->
  <text x="600" y="332" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="21" fill="#a1a1aa" letter-spacing="10">WEB DEVELOPER</text>

  <!-- ─── Trait pills — 3 pills, centered, more breathing room ─── -->
  <!-- Pill: Enterprise Software -->
  <rect x="238" y="370" rx="20" ry="20" width="210" height="38" fill="#0d0d1a" stroke="#3b82f6" stroke-width="0.6"/>
  <circle cx="266" cy="389" r="3.5" fill="#3b82f6" opacity="0.5"/>
  <text x="355" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="14" fill="#7db4fc" letter-spacing="0.5">Enterprise Software</text>

  <!-- Pill: AI-Augmented Dev -->
  <rect x="472" y="370" rx="20" ry="20" width="210" height="38" fill="#0d0d1a" stroke="#8b5cf6" stroke-width="0.6"/>
  <circle cx="500" cy="389" r="3.5" fill="#8b5cf6" opacity="0.5"/>
  <text x="589" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="14" fill="#b49afc" letter-spacing="0.5">AI-Augmented Dev</text>

  <!-- Pill: Full-Stack Builder -->
  <rect x="706" y="370" rx="20" ry="20" width="210" height="38" fill="#0d0d1a" stroke="#6366f1" stroke-width="0.6"/>
  <circle cx="734" cy="389" r="3.5" fill="#6366f1" opacity="0.5"/>
  <text x="823" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="14" fill="#a5b4fc" letter-spacing="0.5">Full-Stack Builder</text>

  <!-- Tagline — generic & punchy -->
  <text x="600" y="458" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="16" fill="#52525b" letter-spacing="0.5">Shipping production-grade web apps powered by modern tech &amp; AI</text>

  <!-- URL capsule -->
  <rect x="490" y="520" rx="14" ry="14" width="220" height="30" fill="none" stroke="#27272a" stroke-width="0.6"/>
  <text x="600" y="540" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-weight="400" font-size="12" fill="#52525b" letter-spacing="2.5">pragadeesh.dev</text>
</svg>
